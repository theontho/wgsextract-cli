name: CI Windows

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: latest
          locked: false
      - name: Configure and Bootstrap Library
        shell: powershell
        env:
          USERPROFILE: ${{ github.workspace }}\.tmp_home
          LOCALAPPDATA: ${{ github.workspace }}\.tmp_home\AppData\Local
          APPDATA: ${{ github.workspace }}\.tmp_home\AppData\Roaming
          PIXI_CACHE_DIR: ${{ github.workspace }}\.tmp_home\.pixi_cache
        run: |
          mkdir .tmp_home\AppData\Local -Force
          mkdir .tmp_home\AppData\Roaming -Force
          mkdir .tmp_home\.config\wgsextract -Force
          pixi run python -c "from wgsextract_cli.core.config import save_config; save_config({'reference_library': 'reference'})"
          pixi run python -m wgsextract_cli.main ref bootstrap --ref reference
      - name: Install Reference Genome
        shell: powershell
        env:
          USERPROFILE: ${{ github.workspace }}\.tmp_home
          LOCALAPPDATA: ${{ github.workspace }}\.tmp_home\AppData\Local
          APPDATA: ${{ github.workspace }}\.tmp_home\AppData\Roaming
          PIXI_CACHE_DIR: ${{ github.workspace }}\.tmp_home\.pixi_cache
        run: pixi run python -m wgsextract_cli.main ref library --install hs38 --ref reference
      - name: Lint and Type Check
        shell: powershell
        run: |
          pixi run ruff check .
          pixi run mypy src/wgsextract_cli tests/test_systematic_genomics.py
      - name: Run Basic Tests
        shell: powershell
        run: pixi run pytest tests/test_smoke.py
