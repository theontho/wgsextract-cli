name: CI Windows

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up WSL
        uses: Vampire/setup-wsl@887f39deb6c0976365e546926fe66f41b77d65ff # v6.1.0
        with:
          distribution: Ubuntu-24.04
      - name: Install WSL Dependencies
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          wsl bash -lc "curl -fsSL https://pixi.sh/install.sh | bash"
          $workspace = "${{ github.workspace }}".Replace('\', '/')
          $wslPath = (wsl wslpath -u "$workspace").Trim()
          wsl bash -lc "rm -rf ~/wgsextract-cli && mkdir -p ~/wgsextract-cli && cd '$wslPath' && tar --exclude=.pixi --exclude=out --exclude=tmp -cf - . | tar -C ~/wgsextract-cli -xf - && cd ~/wgsextract-cli && ~/.pixi/bin/pixi install"
      - name: Run Benchmark
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $env:WSLENV = "GITHUB_STEP_SUMMARY/p"
          wsl bash -lc "cd ~/wgsextract-cli && ~/.pixi/bin/pixi run wgsextract benchmark --dataset real --profile smoke"
          "Benchmark timing is published in this job summary." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
      - name: Run Tests
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          wsl bash -lc "cd ~/wgsextract-cli && ~/.pixi/bin/pixi run test"
      - name: Lint and Type Check
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          wsl bash -lc "cd ~/wgsextract-cli && ~/.pixi/bin/pixi run lint && ~/.pixi/bin/pixi run typecheck"
