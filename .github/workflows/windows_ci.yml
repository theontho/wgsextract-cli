name: CI Windows

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up WSL
        uses: Vampire/setup-wsl@v6
        with:
          distribution: Ubuntu-24.04
      - name: Install WSL Dependencies
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          wsl bash -lc "curl -fsSL https://pixi.sh/install.sh | bash"
          $workspace = "${{ github.workspace }}".Replace('\', '/')
          $wslPath = (wsl wslpath -u "$workspace").Trim()
          wsl bash -lc "cd '$wslPath' && ~/.pixi/bin/pixi install"
      - name: Run Benchmark
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $workspace = "${{ github.workspace }}".Replace('\', '/')
          $wslPath = (wsl wslpath -u "$workspace").Trim()
          wsl bash -lc "cd '$wslPath' && ~/.pixi/bin/pixi run wgsextract benchmark"
      - name: Run Tests
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $workspace = "${{ github.workspace }}".Replace('\', '/')
          $wslPath = (wsl wslpath -u "$workspace").Trim()
          wsl bash -lc "cd '$wslPath' && ~/.pixi/bin/pixi run test"
      - name: Lint and Type Check
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $workspace = "${{ github.workspace }}".Replace('\', '/')
          $wslPath = (wsl wslpath -u "$workspace").Trim()
          wsl bash -lc "cd '$wslPath' && ~/.pixi/bin/pixi run ruff check . && ~/.pixi/bin/pixi run mypy src/wgsextract_cli"
