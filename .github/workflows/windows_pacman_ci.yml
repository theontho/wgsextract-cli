name: CI Windows Pacman Runtime

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GITHUB_TOKEN: ${{ github.token }}
  WGSEXTRACT_TOOL_RUNTIME: pacman
  WGSEXTRACT_PACMAN_UCRT64_BIN: C:\msys64\ucrt64\bin

jobs:
  pacman-runtime:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            curl
            git
            make
            tar
            mingw-w64-ucrt-x86_64-bcftools
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-htslib
            mingw-w64-ucrt-x86_64-samtools
            mingw-w64-ucrt-x86_64-zlib

      - name: Install Pixi
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          iwr -useb https://pixi.sh/install.ps1 | iex
          "$env:USERPROFILE\.pixi\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install project environment
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          pixi install

      - name: Validate Windows installer arguments
        shell: cmd
        run: install_windows.bat --dry-run

      - name: Build and validate pacman runtime
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          .\scripts\setup_pacman_runtime.ps1 -Msys2Root C:\msys64 -ForceBwaBuild
          pixi run wgsextract deps pacman check
          pixi run wgsextract deps check --tool bwa

      - name: Run pacman smoke benchmark
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          pixi run wgsextract benchmark --runtime pacman --dataset real --profile smoke --suite core --outdir out\ci-pacman-benchmark
          "Benchmark timing is published in this job summary." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
