name: Build macOS App

on:
  workflow_dispatch:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos-app:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: latest
          locked: false
      - name: Build DMG
        run: pixi run build-macos-app
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: wgsextract-macos-dmg
          path: |
            out/macos/*.dmg
            out/macos/*.dmg.sha256
      - name: Attach DMG to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "${RELEASE_TAG}" out/macos/*.dmg out/macos/*.dmg.sha256 --clobber
