name: CI Windows (WSL2)

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-wsl:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up WSL
        uses: Vampire/setup-wsl@v7
        with:
          distribution: Ubuntu-24.04
          set-as-default: true
          
      - name: Install Pixi in WSL
        shell: wsl-bash {0}
        run: |
          curl -fsSL https://pixi.sh/install.sh | bash
          
      - name: Initialize Project in WSL
        shell: wsl-bash {0}
        run: |
          ~/.pixi/bin/pixi install
          
      - name: Verify Tools in WSL
        shell: wsl-bash {0}
        run: |
          chmod +x ./scripts/verify_tools.sh
          ~/.pixi/bin/pixi run ./scripts/verify_tools.sh
          
      - name: Bootstrap Reference Library in WSL
        shell: wsl-bash {0}
        run: |
          ~/.pixi/bin/pixi run python -c 'from wgsextract_cli.core.config import save_config; save_config({"reference_library": "reference"})'
          ~/.pixi/bin/pixi run python -m wgsextract_cli.main ref bootstrap --ref reference

      - name: Install Reference Genome in WSL
        shell: wsl-bash {0}
        run: |
          ~/.pixi/bin/pixi run python -m wgsextract_cli.main ref library --install hs38 --ref reference

      - name: Lint and Type Check in WSL
        shell: wsl-bash {0}
        run: |
          ~/.pixi/bin/pixi run ruff check .
          ~/.pixi/bin/pixi run mypy src/wgsextract_cli

      - name: Run Basic Tests in WSL
        shell: wsl-bash {0}
        run: |
          ~/.pixi/bin/pixi run pytest tests/test_smoke.py
