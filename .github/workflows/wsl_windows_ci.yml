name: CI Windows (WSL Runtime)

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-wsl:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: latest
          locked: false
      - name: Validate WSL Runtime Logic
        shell: powershell
        env:
          USERPROFILE: ${{ github.workspace }}\.tmp_home
          LOCALAPPDATA: ${{ github.workspace }}\.tmp_home\AppData\Local
          APPDATA: ${{ github.workspace }}\.tmp_home\AppData\Roaming
          PIXI_CACHE_DIR: ${{ github.workspace }}\.tmp_home\.pixi_cache
        run: |
          mkdir .tmp_home\AppData\Local -Force
          mkdir .tmp_home\AppData\Roaming -Force
          pixi run ruff check src/wgsextract_cli/core/runtime.py src/wgsextract_cli/core/utils.py src/wgsextract_cli/commands/deps.py tests/test_wsl_runtime.py tests/test_optional_deps.py
          pixi run mypy --no-incremental src/wgsextract_cli/core/runtime.py src/wgsextract_cli/core/utils.py src/wgsextract_cli/commands/deps.py
          pixi run pytest tests/test_wsl_runtime.py tests/test_optional_deps.py
      - name: Run Benchmark
        shell: powershell
        env:
          USERPROFILE: ${{ github.workspace }}\.tmp_home
          LOCALAPPDATA: ${{ github.workspace }}\.tmp_home\AppData\Local
          APPDATA: ${{ github.workspace }}\.tmp_home\AppData\Roaming
          PIXI_CACHE_DIR: ${{ github.workspace }}\.tmp_home\.pixi_cache
        run: pixi run wgsextract benchmark
