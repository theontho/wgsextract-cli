name: CI macOS

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          pixi-version: latest
          locked: false
      - name: Test installer
        run: scripts/test_install_sh.sh
      - name: Verify Tools
        run: chmod +x scripts/verify_tools.sh && pixi run scripts/verify_tools.sh
      - name: Configure and Bootstrap Library
        env:
          HOME: ${{ github.workspace }}/.tmp_home
        run: |
          mkdir -p .tmp_home/.config/wgsextract
          pixi run python -c "from wgsextract_cli.core.config import save_config; save_config({'reference_library': 'reference'})"
          pixi run python -m wgsextract_cli.main ref bootstrap --ref reference
      - name: Install Reference Genome
        env:
          HOME: ${{ github.workspace }}/.tmp_home
        run: pixi run python -m wgsextract_cli.main ref library --install hs38 --ref reference
      - name: Lint and Type Check
        run: |
          pixi run lint
          pixi run typecheck
      - name: Run Benchmark
        run: |
          pixi run wgsextract benchmark --dataset real --profile smoke
          echo "Benchmark timing is published in this job summary."
      - name: Run Tests
        run: pixi run test
