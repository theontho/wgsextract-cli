<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background App Squircle -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bg)" filter="url(#shadow)" />
  <rect x="32" y="32" width="448" height="448" rx="100" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="4" />

  <!-- Emoji Composition -->
  <g filter="url(#shadow)">
    <!-- DNA directly in the mathematical center -->
    <text x="256" y="256" font-size="240" text-anchor="middle" dominant-baseline="central" font-family="'Apple Color Emoji', 'Segoe UI Emoji', sans-serif">🧬</text>

    <!-- Toolbox nested in the bottom right corner -->
    <text x="380" y="380" font-size="160" text-anchor="middle" dominant-baseline="central" font-family="'Apple Color Emoji', 'Segoe UI Emoji', sans-serif">🧰</text>
  </g>
</svg>
