[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "wgsextract-cli"
version = "0.1.0"
description = "A modern, standalone Command-Line Interface for WGS Extract."
readme = "README.md"
requires-python = ">=3.11"
license = "GPL-3.0-or-later"
authors = [
    { name = "WGS Extract Contributors" }
]
dependencies = [
    "python-dotenv", # Loads environment variables (e.g., WGSE_REF) from .env files
    "pyliftover",    # Performs hg38 to hg19 coordinate liftover for microarray simulations
    "psutil",        # Detects system RAM/CPU for automatic resource tuning (e.g., samtools memory)
    # Unused dependencies (currently delegated to external binaries or not yet implemented):
    # "wakepy",    # Intended to prevent system sleep during long operations (not yet implemented in CLI)
    # "pandas",    # Data analysis/manipulation (CLI currently uses awk and subprocess)
    # "numpy",     # Numerical calculations (CLI currently uses awk and subprocess)
    # "biopython", # Bioinformatic file parsing (CLI delegates to samtools/bcftools)
    # "pyfaidx",   # Efficient FASTA indexing/access (CLI delegates to samtools)
    # "openpyxl",  # Excel file support (used by GUI for language.xlsx; not needed by CLI)
    # "requests",  # HTTP library (CLI currently uses wget via subprocess)
    # "urllib3"    # HTTP client (CLI currently uses wget via subprocess)
]

[project.scripts]
wgsextract-cli = "wgsextract_cli.main:main"

[dependency-groups]
dev = [
    "pytest>=7.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/wgsextract_cli"]
