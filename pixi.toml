[workspace]
name = "wgsextract-cli"
version = "0.3.5"
description = "A modern, standalone Command-Line Interface for WGS Extract."
authors = ["WGS Extract Contributors"]
channels = ["conda-forge", "bioconda"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[dependencies]
python = "3.10.*"
nodejs = ">=22,<26"
actionlint = ">=1.7.12,<2"

[target.osx-arm64.dependencies]
curl = ">=8.0"
gzip = "*"
tar = "*"

[target.osx-64.dependencies]
curl = ">=8.0"
gzip = "*"
tar = "*"

[target.linux-64.dependencies]
curl = ">=8.0"
gzip = "*"
tar = "*"

[target.win-64.dependencies]
curl = ">=8.0"

[feature.gatk.dependencies]
openjdk = "17.*"

[feature.gatk.target.osx-arm64.dependencies]
gatk4 = ">=4.5.0.0"

[feature.gatk.target.osx-64.dependencies]
gatk4 = ">=4.5.0.0"

[feature.gatk.target.linux-64.dependencies]
gatk4 = ">=4.5.0.0"

[feature.bio-tools]

[feature.bio-tools.target.osx-arm64.dependencies]
samtools = ">=1.20"
bcftools = ">=1.20"
htslib = ">=1.20"
bwa = ">=0.7.17"
minimap2 = ">=2.28"
fastp = ">=0.23.4"
fastqc = ">=0.12.1"
freebayes = ">=1.3.6"
haplogrep = ">=2.4.0"
delly = ">=1.1.6"
sambamba = ">=1.0"
samblaster = ">=0.1.26"

[feature.bio-tools.target.osx-64.dependencies]
samtools = ">=1.20"
bcftools = ">=1.20"
htslib = ">=1.20"
bwa = ">=0.7.17"
minimap2 = ">=2.28"
fastp = ">=0.23.4"
fastqc = ">=0.12.1"
freebayes = ">=1.3.6"
haplogrep = ">=2.4.0"
delly = ">=1.1.6"
sambamba = ">=1.0"
samblaster = ">=0.1.26"

[feature.bio-tools.target.linux-64.dependencies]
samtools = ">=1.20"
bcftools = ">=1.20"
htslib = ">=1.20"
bwa = ">=0.7.17"
minimap2 = ">=2.28"
fastp = ">=0.23.4"
fastqc = ">=0.12.1"
freebayes = ">=1.3.6"
haplogrep = ">=2.4.0"
delly = ">=1.1.6"
sambamba = ">=1.0"
samblaster = ">=0.1.26"
wget = ">=1.21"


[feature.deepvariant.dependencies]
python = "3.10.*"

[feature.deepvariant.target.linux-64.dependencies]
deepvariant = ">=1.6.0"
openjdk = "11.*"

[feature.deepvariant.target.osx-arm64.dependencies]
deepvariant = ">=1.6.0"
openjdk = "11.*"

[feature.deepvariant.pypi-dependencies]
wgsextract-cli = { path = ".", editable = true }

[feature.pacbio.dependencies]
python = "3.10.*"

[feature.pacbio.pypi-dependencies]
wgsextract-cli = { path = ".", editable = true }

[feature.pacbio.target.linux-64.dependencies]
pbmm2 = ">=1.17.0"
pbsv = ">=2.10.0"
sniffles = ">=2.7.0"

[feature.pacbio.target.osx-arm64.dependencies]
sniffles = ">=2.7.0"

[feature.pacbio.target.osx-64.dependencies]
pbmm2 = ">=1.7.0,<1.8.0"
sniffles = ">=2.7.0"

[feature.vep]

[feature.vep.target.osx-64.dependencies]
ensembl-vep = ">=110"

[feature.vep.target.linux-64.dependencies]
ensembl-vep = ">=110"

[feature.pysam.target.osx-arm64.pypi-dependencies]
pysam = "*"
[feature.pysam.target.osx-64.pypi-dependencies]
pysam = "*"
[feature.pysam.target.linux-64.pypi-dependencies]
pysam = "*"
[feature.pysam.target.win-64.pypi-dependencies]
# pysam is not supported on native Windows

[environments]
default = { features = ["gatk", "bio-tools", "pysam"] }
deepvariant = { features = ["deepvariant"], no-default-feature = true }
pacbio = { features = ["bio-tools", "pacbio"], no-default-feature = true, solve-group = "pacbio-unix" }
vep = { features = ["vep"], no-default-feature = true }

[pypi-dependencies]
python-dotenv = "*"
pyliftover = "*"
psutil = "*"
# pysam = "*" (fails on Windows, added to platform-specific features below)
# Dev tools
pytest = "*"
pytest-asyncio = "*"
ruff = "*"
isort = "*"
mypy = "*"
pathspec = "<0.10"
pre-commit = "*"
uv = "*"
# Local projects
wgsextract-cli = { path = ".", editable = true }

[tasks]
deps-check = "./wgsextract deps check"
test = "pytest --ignore=tests/test_e2e_fast_chrM.py --ignore=tests/test_e2e_full_genome.py --ignore=tests/test_microarray_real_data.py"
test-e2e = "pytest tests/test_e2e_fast_chrM.py tests/test_e2e_full_genome.py tests/test_microarray_real_data.py"
test-e2e-fake = "WGSE_USE_FAKE_DATA=1 pytest tests/test_e2e_fast_chrM.py tests/test_e2e_full_genome.py"
actionlint = "actionlint"
validate-actions = "python scripts/validate_github_actions.py"
lint = "ruff check . && python scripts/validate_site_sources.py && actionlint && python scripts/validate_github_actions.py"
format = "ruff format ."
typecheck = "mypy src/wgsextract_cli"
package-smoke = "rm -rf out/package-smoke && mkdir -p out/package-smoke && uv build --wheel --out-dir out/package-smoke/dist && uv venv out/package-smoke/venv --clear && uv pip install --python out/package-smoke/venv/bin/python out/package-smoke/dist/*.whl && out/package-smoke/venv/bin/wgsextract --help >/dev/null"
jscpd = "npx --yes jscpd@4.2.3 src/wgsextract_cli --reporters console,json --output out/jscpd --min-lines 5 --min-tokens 50 --ignore '**/__pycache__/**' --ignore '**/.mypy_cache/**'"
site-build = "python scripts/build_site.py"
stats = "python scripts/project_stats.py"
stats-report = "python scripts/project_stats.py out/project_stats.txt"
smoke-test = "pytest tests/test_smoke.py tests/test_smoke_real_basics.py tests/test_smoke_real_vcf.py tests/test_smoke_real_vcf_ann.py tests/test_smoke_real_expert.py tests/test_smoke_real_ref.py"
smoke-test-full = "pytest tests/test_smoke.py tests/test_smoke_real_basics.py tests/test_smoke_real_vcf.py tests/test_smoke_real_vcf_ann.py tests/test_smoke_real_expert.py tests/test_smoke_real_ref.py tests/test_smoke_real_full.py tests/test_smoke_real_pet.py"
