[workspace]
name = "wgsextract-cli"
version = "0.1.0"
description = "A modern, standalone Command-Line Interface for WGS Extract."
authors = ["WGS Extract Contributors"]
channels = ["conda-forge", "bioconda"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[dependencies]
python = "3.10.*"
curl = ">=8.0"
gzip = "*"
tar = "*"

[feature.gatk.dependencies]
openjdk = "17.*"

[feature.gatk.target.osx-arm64.dependencies]
gatk4 = ">=4.5.0.0"

[feature.gatk.target.osx-64.dependencies]
gatk4 = ">=4.5.0.0"

[feature.gatk.target.linux-64.dependencies]
gatk4 = ">=4.5.0.0"

[feature.bio-tools]

[feature.bio-tools.target.osx-arm64.dependencies]
samtools = ">=1.20"
bcftools = ">=1.20"
htslib = ">=1.20"
bwa = ">=0.7.17"
minimap2 = ">=2.28"
fastp = ">=0.23.4"
fastqc = ">=0.12.1"
freebayes = ">=1.3.6"
haplogrep = ">=2.4.0"
delly = ">=1.1.6"
sambamba = ">=1.0"
samblaster = ">=0.1.26"

[feature.bio-tools.target.osx-64.dependencies]
samtools = ">=1.20"
bcftools = ">=1.20"
htslib = ">=1.20"
bwa = ">=0.7.17"
minimap2 = ">=2.28"
fastp = ">=0.23.4"
fastqc = ">=0.12.1"
freebayes = ">=1.3.6"
haplogrep = ">=2.4.0"
delly = ">=1.1.6"
sambamba = ">=1.0"
samblaster = ">=0.1.26"

[feature.bio-tools.target.linux-64.dependencies]
samtools = ">=1.20"
bcftools = ">=1.20"
htslib = ">=1.20"
bwa = ">=0.7.17"
minimap2 = ">=2.28"
fastp = ">=0.23.4"
fastqc = ">=0.12.1"
freebayes = ">=1.3.6"
haplogrep = ">=2.4.0"
delly = ">=1.1.6"
sambamba = ">=1.0"
samblaster = ">=0.1.26"
wget = ">=1.21"


[feature.deepvariant.target.linux-64.dependencies]
deepvariant = ">=1.6.0"
openjdk = "11.*"

[feature.deepvariant.target.osx-arm64.dependencies]
deepvariant = ">=1.6.0"
openjdk = "11.*"

[feature.vep]

[feature.vep.target.osx-64.dependencies]
ensembl-vep = ">=110"

[feature.vep.target.linux-64.dependencies]
ensembl-vep = ">=110"

[feature.pysam.target.osx-arm64.pypi-dependencies]
pysam = "*"
[feature.pysam.target.osx-64.pypi-dependencies]
pysam = "*"
[feature.pysam.target.linux-64.pypi-dependencies]
pysam = "*"

[environments]
default = { features = ["gatk", "bio-tools", "pysam"] }
deepvariant = { features = ["deepvariant"], no-default-feature = true }
vep = { features = ["vep"], no-default-feature = true }

[pypi-dependencies]
python-dotenv = "*"
pyliftover = "*"
psutil = "*"
customtkinter = "*"
Pillow = "*"
nicegui = "*"
# pysam = "*" (fails on Windows, added to platform-specific features below)
# Dev tools
pytest = "*"
pytest-asyncio = "*"
playwright = "*"
ruff = "*"
mypy = "*"
pre-commit = "*"
selenium = "*"
# Local projects
wgsextract-cli = { path = ".", editable = true }

[tasks]
deps-check = "./wgsextract deps check"
test = "pytest --ignore=tests/test_e2e_fast_chrM.py --ignore=tests/test_e2e_full_genome.py --ignore=tests/test_microarray_real_data.py --ignore=tests/test_web_ui_e2e.py"
test-e2e = "pytest tests/test_e2e_fast_chrM.py tests/test_e2e_full_genome.py tests/test_microarray_real_data.py tests/test_web_ui_e2e.py"
test-e2e-fake = "WGSE_USE_FAKE_DATA=1 pytest tests/test_e2e_fast_chrM.py tests/test_e2e_full_genome.py"
lint = "ruff check ."
format = "ruff format ."
typecheck = "mypy src/wgsextract_cli"
stats = "./scripts/project_stats.sh"
smoke-test = "./smoke_test_scripts/run_all_smoke_tests.sh"
smoke-test-full = "./smoke_test_scripts/run_all_smoke_tests.sh --real-data"
