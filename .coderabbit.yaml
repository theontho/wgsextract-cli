# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
early_access: false
tone_instructions: |
  Be concise and direct. Focus on correctness, security, and maintainability.
  Skip nits about style/formatting (handled by ruff).

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_filters:
    - "!**/.venv/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/__pycache__/**"
    - "!**/*.egg-info/**"
    - "!**/site/**"
    - "!**/out/**"
    - "!**/tmp/**"
    - "!**/scratch/**"
    - "!**/node_modules/**"
    - "!uv.lock"
    - "!pixi.lock"
    - "!**/*.lock"
  path_instructions:
    - path: "src/**/*.py"
      instructions: |
        Library/CLI source. Prefer explicit type annotations. Use pathlib over os.path.
        Redact secrets (keys, tokens, credentials) when displaying configuration.
    - path: "tests/**/*.py"
      instructions: |
        pytest. Verify both happy and error paths. Avoid silent assertions.
    - path: "scripts/**"
      instructions: |
        Verify both interactive and non-interactive behavior.

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: auto
  issues:
    scope: auto
