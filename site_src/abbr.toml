[abbreviations]
BAM = "Binary Alignment Map: a compressed binary file of sequencing reads aligned to a reference genome."
BCF = "Binary Call Format: a compact binary version of VCF used for efficient variant storage and processing."
BED = "Browser Extensible Data: a text format for genomic intervals such as regions, targets, or gene coordinates."
CLI = "Command-Line Interface: a terminal-based way to run repeatable commands and automate workflows."
CNV = "Copy Number Variant: a genomic region where copies are deleted or duplicated compared with expectation."
CPU = "Central Processing Unit: the main processor that runs computation-heavy genomics commands."
CRAM = "Compressed Reference-oriented Alignment Map: a space-saving alignment format that depends on a matching reference genome."
CSS = "Cascading Style Sheets: the language used to style web pages."
DNA = "Deoxyribonucleic Acid: the molecule that carries inherited genetic information."
FASTA = "FASTA sequence format: a plain-text format for reference genomes or other biological sequences."
FASTQ = "FASTQ read format: raw sequencing reads with per-base quality scores."
FTDNA = "FamilyTreeDNA: a consumer genealogy service and raw-data format target."
GATK = "Genome Analysis Toolkit: a widely used suite of tools for variant discovery and genomics workflows."
GPL = "GNU General Public License: the open-source license used by this project."
GUI = "Graphical User Interface: a visual app interface for running workflows without typing every command."
HTML = "HyperText Markup Language: the document format generated for the static website."
InDel = "Insertion or Deletion: a small variant where bases are added or removed relative to the reference."
InDels = "Insertions or Deletions: small variants where bases are added or removed relative to the reference."
MSYS2 = "Minimal SYStem 2: a Windows environment that provides Unix-like tools and package management."
MT = "Mitochondrial chromosome: the chromosome name often used for mitochondrial DNA in some reference builds."
OS = "Operating System: the platform running the application, such as macOS, Linux, or Windows."
RAM = "Random Access Memory: working memory used by tools while processing large genomics files."
mtDNA = "Mitochondrial DNA: DNA inherited mostly through the maternal line and stored in mitochondria."
QC = "Quality Control: checks that help assess whether data and outputs are usable."
SAM = "Sequence Alignment Map: a text alignment format that is usually converted to BAM or CRAM."
SNP = "Single Nucleotide Polymorphism: a one-base marker or variant, commonly used by microarray SNP chips."
SNPs = "Single Nucleotide Polymorphisms: one-base markers or variants, commonly used by microarray SNP chips."
SV = "Structural Variant: a larger genomic change such as a deletion, duplication, inversion, or rearrangement."
T2T = "Telomere-to-Telomere: a newer reference approach that aims to represent chromosomes end to end."
TOML = "Tom's Obvious Minimal Language: a human-readable configuration file format."
UCRT64 = "Universal C Runtime 64-bit: the 64-bit MSYS2 environment based on Microsoft's Universal C Runtime."
VCF = "Variant Call Format: a standard text format for variants and their annotations."
VCFs = "Variant Call Format files: files containing variants and annotations in the VCF standard."
VEP = "Variant Effect Predictor: an annotation tool that predicts variant effects on genes and transcripts."
WGS = "Whole Genome Sequencing: sequencing that reads across nearly all of the genome for reusable analysis."
WSL = "Windows Subsystem for Linux: a Windows feature for running Linux environments."
WSL2 = "Windows Subsystem for Linux 2: the VM-backed version of WSL used for Linux-compatible workflows on Windows."
"Y-DNA" = "Y-chromosome DNA: DNA on the Y chromosome, often used for paternal-line genealogy."

