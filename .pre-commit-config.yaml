repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [ --fix ]
        files: ^
      - id: ruff-format
        files: ^
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        files: ^
      - id: end-of-file-fixer
        files: ^
      - id: check-yaml
        files: ^
      - id: check-added-large-files
        files: ^
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        files: ^
  - repo: local
    hooks:
      - id: actionlint
        name: actionlint
        entry: python scripts/run_actionlint.py
        language: system
        pass_filenames: false
        files: ^\.github/workflows/.*\.ya?ml$
      - id: validate-github-actions
        name: validate GitHub Actions versions
        entry: python scripts/validate_github_actions.py
        language: python
        pass_filenames: false
        files: ^(\.github/workflows/.*\.ya?ml|scripts/validate_github_actions\.py)$
      - id: validate-site-sources
        name: validate site sources
        entry: python scripts/validate_site_sources.py
        language: python
        additional_dependencies: [tomli]
        pass_filenames: false
        files: ^(site_src/.*\.(md|toml)|scripts/(build_site|validate_site_sources)\.py)$
      - id: mypy
        name: mypy (via pixi)
        entry: pixi run mypy
        language: system
        types: [python]
        pass_filenames: false
        files: ^src/wgsextract_cli/.*\.py$
